{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>New Customer</h2>
    <form method="POST" style="display:grid; gap:15px; max-width:500px;">
        <label>Business Name</label>
        <input type="text" name="business_name" required style="padding:10px; border:1px solid #ddd; border-radius:4px;">
        <label>Contact Name</label>
        <input type="text" name="contact_name" style="padding:10px; border:1px solid #ddd; border-radius:4px;">
        <label>Phone</label>
        <input type="tel" name="phone" style="padding:10px; border:1px solid #ddd; border-radius:4px;">
        <label>Email</label>
        <input type="email" name="email" style="padding:10px; border:1px solid #ddd; border-radius:4px;">
        <label>Address</label>
        <textarea name="address" style="padding:10px; border:1px solid #ddd; border-radius:4px;"></textarea>
        <label>Postcode</label>
        <input type="text" name="postcode" style="padding:10px; border:1px solid #ddd; border-radius:4px;">
        <label>Status</label>
        <select name="status" style="padding:10px; border:1px solid #ddd; border-radius:4px;">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
        </select>
        <button type="submit" class="btn btn-primary">Save Customer</button>
    </form>
</div>
{% endblock %}
