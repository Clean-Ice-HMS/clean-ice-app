{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>Customers</h2>
    <a href="/customers/new" class="btn btn-primary">+ New Customer</a>
    <table style="margin-top:20px;">
        <tr><th>Business</th><th>Contact</th><th>Phone</th><th>Email</th><th>Actions</th></tr>
        {% for c in customers %}
        <tr>
            <td>{{ c.business_name }}</td>
            <td>{{ c.contact_name }}</td>
            <td>{{ c.phone }}</td>
            <td>{{ c.email }}</td>
            <td>
                <a href="/customers/{{ c.id }}">View</a> | 
                <a href="/customers/{{ c.id }}/edit" style="color:#1a5276;">Edit</a>
            </td>
        </tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
