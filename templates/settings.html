{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>Email Settings</h2>
    
    {% if request.args.get('saved') %}
    <div style="padding:15px; background:#d4edda; border:1px solid #28a745; border-radius:8px; margin-bottom:20px; color:#155724;">
        ✓ Settings saved
    </div>
    {% endif %}
    
    <form method="POST" style="display:grid; gap:15px; max-width:500px;">
        <label>SMTP Server</label>
        <input type="text" name="smtp_server" value="{{ config.smtp_server }}" style="padding:10px; border:1px solid #ddd; border-radius:4px;">
        <label>SMTP Port</label>
        <input type="number" name="smtp_port" value="{{ config.smtp_port }}" style="padding:10px; border:1px solid #ddd; border-radius:4px;">
        <label>Your Email</label>
        <input type="email" name="sender_email" value="{{ config.sender_email }}" style="padding:10px; border:1px solid #ddd; border-radius:4px;">
        <label>Password / App Password</label>
        <input type="password" name="sender_password" value="{{ config.sender_password }}" style="padding:10px; border:1px solid #ddd; border-radius:4px;">
        <button type="submit" class="btn btn-primary">Save Settings</button>
    </form>
</div>
{% endblock %}
